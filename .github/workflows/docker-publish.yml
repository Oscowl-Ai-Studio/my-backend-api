name: Build and Publish Docker Image

on:
  push:
    branches: [ "feat/workspace-lifecycle-crud" ]

env:
  REGISTRY: ghcr.io
  # We use this to store the lowercase name
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- THIS STEP FIXES THE UPPERCASE ERROR ---
      - name: Downcase Image Name
        run: |
          echo "IMAGE_ID=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # We use 'env.IMAGE_ID' (the lowercase one) instead of 'IMAGE_NAME'
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_ID }}:latest